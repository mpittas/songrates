<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <rect width="1200" height="400" fill="#0a0a0d"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1200" y2="400">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#0a0a0d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="400" x2="1200" y2="0">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0d" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#g1)"/>
  <rect width="1200" height="400" fill="url(#g2)"/>
  <!-- Subtle grid lines -->
  <g stroke="#00f0ff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="150" cy="200" r="80" stroke="#00f0ff" stroke-opacity="0.04" stroke-width="1" fill="none"/>
  <circle cx="150" cy="200" r="120" stroke="#00f0ff" stroke-opacity="0.02" stroke-width="1" fill="none"/>
  <circle cx="1050" cy="150" r="60" stroke="#00f0ff" stroke-opacity="0.04" stroke-width="1" fill="none"/>
  <circle cx="1050" cy="150" r="100" stroke="#00f0ff" stroke-opacity="0.02" stroke-width="1" fill="none"/>
  <!-- Sound wave bars -->
  <g fill="#00f0ff" fill-opacity="0.06">
    <rect x="540" y="160" width="3" height="80" rx="1.5"/>
    <rect x="550" y="140" width="3" height="120" rx="1.5"/>
    <rect x="560" y="120" width="3" height="160" rx="1.5"/>
    <rect x="570" y="150" width="3" height="100" rx="1.5"/>
    <rect x="580" y="130" width="3" height="140" rx="1.5"/>
    <rect x="590" y="110" width="3" height="180" rx="1.5"/>
    <rect x="600" y="100" width="3" height="200" rx="1.5"/>
    <rect x="610" y="110" width="3" height="180" rx="1.5"/>
    <rect x="620" y="130" width="3" height="140" rx="1.5"/>
    <rect x="630" y="150" width="3" height="100" rx="1.5"/>
    <rect x="640" y="120" width="3" height="160" rx="1.5"/>
    <rect x="650" y="140" width="3" height="120" rx="1.5"/>
    <rect x="660" y="160" width="3" height="80" rx="1.5"/>
  </g>
</svg>
